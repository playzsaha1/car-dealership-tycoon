<!DOCTYPE html>
<html>
<head>
  <title>Autoline</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body class="page-landing">

<header class="brand-bar">
  <h1 class="brand-logo">AUTOLINE</h1>
  <nav>
    <a href="market.html">Market</a>
    <a href="garage.html">Garage</a>
  </nav>
</header>

<section class="hero">
  <h1>Build Your Dealership Empire</h1>
  <p>Buy low. Repair. Sell high.</p>

  <button onclick="startGame()" class="btn primary">Start Game</button>
  <button onclick="replayTutorial()" class="btn primary">Tutorial</button>
  <button onclick="resetGame()" class="btn ghost">Reset Game</button>
</section>

<!-- Tutorial Modal -->
<div id="tutorialOverlay" class="tutorial-overlay"></div>
<div id="tutorialModal" class="tutorial-modal">
  <div class="tutorial-content">
    <h2 id="tutorialTitle"></h2>
    <p id="tutorialDesc"></p>
    <p id="tutorialAction" class="tutorial-action"></p>
    <div class="tutorial-buttons">
      <button onclick="nextTutorialStep()" class="btn primary">Next</button>
      <button onclick="endTutorial()" class="btn ghost">Skip Tutorial</button>
    </div>
  </div>
</div>

<script src="script.js"></script>
<script>
function startGame(){
  startNewGame();
  window.location.href="market.html";
}
</script>

</body>
</html>
