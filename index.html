<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Car Dealership Simulator</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="page-landing">
  <header class="brand-bar">
    <div class="brand-logo">AUTOLINE</div>
    <nav>
      <a href="market.html">Market</a>
      <a href="garage.html">Garage</a>
    </nav>
  </header>

  <main class="hero">
    <div class="hero-content">
      <h1>Build Your Own Dealership.</h1>
      <p>Start small, trade smart, and grow into a premium showroom—just like the big brands.</p>
      <div class="hero-actions">
        <button id="startBtn" class="btn primary">Start New Dealership</button>
        <button id="continueBtn" class="btn ghost">Continue</button>
      </div>
    </div>
    <div class="hero-panel">
      <div class="hero-stat-card">
        <h2>Realistic Market</h2>
        <p>Dynamic pricing, conditions, and margins inspired by real-world dealerships.</p>
      </div>
      <div class="hero-stat-row">
        <div class="hero-stat">
          <span class="label">Starting Capital</span>
          <span class="value">$50,000</span>
        </div>
        <div class="hero-stat">
          <span class="label">Cars Available</span>
          <span class="value">Live Market</span>
        </div>
      </div>
    </div>
  </main>

  <script src="script.js"></script>
  <script>
    document.getElementById('startBtn').onclick = () => {
      startNewGame();
      window.location.href = 'market.html';
    };
    document.getElementById('continueBtn').onclick = () => {
      window.location.href = 'market.html';
    };
  </script>
</body>
</html>
