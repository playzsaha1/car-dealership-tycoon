<!DOCTYPE html>
<html>
<head>
  <title>Market</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body class="page-app">

<header class="topbar">
  <h2>Market</h2>
  <div id="moneyDisplay"></div>
  <a href="garage.html" id="garage-link">Garage</a>
</header>

<div class="app-main">
  <button onclick="nextDay()">Next Day</button>
  <div id="marketList" class="grid"></div>
</div>

<!-- Tutorial Modal -->
<div id="tutorialOverlay" class="tutorial-overlay"></div>
<div id="tutorialModal" class="tutorial-modal">
  <div class="tutorial-content">
    <h2 id="tutorialTitle"></h2>
    <p id="tutorialDesc"></p>
    <p id="tutorialAction" class="tutorial-action"></p>
    <div class="tutorial-buttons">
      <button onclick="nextTutorialStep()" class="btn primary">Next</button>
      <button onclick="endTutorial()" class="btn ghost">Skip Tutorial</button>
    </div>
  </div>
</div>

<script src="script.js"></script>
<script>
loadGame();
renderMoney();
loadMarket();
if (!game.tutorialComplete && !tutorialState.active) {
  startTutorial();
}
</script>

</body>
</html>
